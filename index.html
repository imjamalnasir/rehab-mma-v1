<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMA & Sports Rehab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Open Sans', sans-serif; color: #2d2d2d; background: #fff; overflow-x: hidden; }
    h1,h2,h3,h4,h5 { font-family: 'Montserrat', sans-serif; }

    /* TOP BAR */
    .top-bar { background: #f2f4f6; border-bottom: 1px solid #e4e7ea; height: 38px; display: flex; align-items: center; padding: 0 5vw; position: fixed; top: 0; left: 0; right: 0; z-index: 101; justify-content: flex-end; }
    .top-bar-msg { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 600; color: #3a3a3a; letter-spacing: 0.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-bar-msg span { color: #EE7D0C; font-weight: 700; }
    .top-bar-links { display: flex; align-items: center; gap: 1.25rem; }
    .top-bar-link { display: flex; align-items: center; gap: 5px; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; color: #444; text-decoration: none; transition: color 0.2s; letter-spacing: 0.3px; white-space: nowrap; }
    .top-bar-link:hover { color: #4794A8; }
    .top-bar-link svg { flex-shrink: 0; }
    .top-bar-sep { color: #ccc; font-size: 0.65rem; }

    /* NAV */
    .nav { position: fixed; top: 38px; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.97); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(0,0,0,0.08); display: flex; align-items: center; justify-content: space-between; padding: 0 5vw; height: 70px; }
    .nav-logo img { height: 38px; width: auto; object-fit: contain; display: block; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { text-decoration: none; color: #2d2d2d; font-size: 0.88rem; font-weight: 500; font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px; transition: color 0.2s; }
    .nav-links a:hover { color: #4794A8; }
    .nav-cta { background: #EE7D0C; color: #fff; border: none; border-radius: 6px; padding: 10px 22px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: background 0.2s, transform 0.15s; letter-spacing: 0.3px; }
    .nav-cta:hover { background: #d96e08; transform: translateY(-1px); }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .nav-hamburger span { display: block; width: 24px; height: 2px; background: #2d2d2d; border-radius: 2px; transition: 0.3s; }

    /* HERO */
    .hero { position: relative; min-height: 100vh; display: flex; align-items: center; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: linear-gradient(120deg, #0a1628 0%, #12304a 50%, #1a4a5a 100%); }
    .hero-bg-pattern { position: absolute; inset: 0; opacity: 0.04; background-image: repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 1px, transparent 60px), repeating-linear-gradient(90deg, #fff 0px, #fff 1px, transparent 1px, transparent 60px); }
    .hero-img-side { position: absolute; right: 0; top: 0; bottom: 0; width: 52%; background: linear-gradient(to right, #12304a 0%, transparent 30%), url('uploads/hero-banner 3.png') center/cover no-repeat; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 3rem 2.5rem 3rem 4rem; z-index: 1; }
    .hero-img-side::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, #12304a 20%, rgba(18,48,74,0.25) 100%); pointer-events: none; }
    .hero-trust-overlay { position: relative; z-index: 2; display: flex; flex-direction: column; gap: 1rem; align-items: flex-start; }
    .trust-card { background: rgba(10,30,60,0.55); backdrop-filter: blur(12px); border: 1px solid rgba(71,148,168,0.3); border-radius: 12px; padding: 1.25rem 1.75rem; display: flex; align-items: center; gap: 16px; width: 240px; justify-content: flex-start; }
    .hero-content { position: relative; z-index: 2; padding: 0 5vw 0 100px; padding-top: 108px; max-width: 680px; }
    .hero-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(71,148,168,0.2); border: 1px solid rgba(71,148,168,0.4); color: #7dc4d8; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; margin-bottom: 1.5rem; }
    .hero-tag::before { content: ''; display: block; width: 6px; height: 6px; background: #4794A8; border-radius: 50%; }
    .hero h1 { font-size: clamp(2.4rem, 5vw, 4rem); font-weight: 800; color: #fff; line-height: 1.1; margin-bottom: 1.25rem; letter-spacing: -1px; }
    .hero h1 em { color: #EE7D0C; font-style: normal; }
    .hero-sub { font-size: clamp(1rem, 1.5vw, 1.15rem); color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 2.5rem; max-width: 480px; }
    .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 3.5rem; }
    .btn-primary { background: #EE7D0C; color: #fff; border: none; border-radius: 8px; padding: 16px 32px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(238,125,12,0.4); letter-spacing: 0.3px; }
    .btn-primary:hover { background: #d96e08; transform: translateY(-2px); box-shadow: 0 6px 28px rgba(238,125,12,0.5); }
    .btn-secondary { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 14px 28px; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s; }
    .btn-secondary:hover { border-color: #fff; background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    .hero-trust { display: flex; gap: 2rem; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 10px; }
    .trust-icon { width: 52px; height: 52px; background: rgba(71,148,168,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .trust-text { font-size: 0.82rem; color: rgba(255,255,255,0.7); font-family: 'Montserrat', sans-serif; }
    .trust-text strong { display: block; color: #fff; font-size: 0.95rem; font-weight: 700; }
    .hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 2; }
    .hero-scroll span { font-size: 0.72rem; color: rgba(255,255,255,0.4); font-family: 'Montserrat', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
    .scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent); animation: scrollPulse 1.8s ease-in-out infinite; }
    @keyframes scrollPulse { 0%,100% { opacity: 0.4; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.2); } }

    /* FADE IN */
    .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    .fade-in-delay-1 { transition-delay: 0.1s; }
    .fade-in-delay-2 { transition-delay: 0.2s; }
    .fade-in-delay-3 { transition-delay: 0.3s; }
    .fade-in-delay-4 { transition-delay: 0.4s; }

    /* SECTION SHARED */
    .section { padding: 100px 5vw; }
    .section-label { font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #EE7D0C; margin-bottom: 0.75rem; }
    .section-title { font-size: clamp(1.8rem, 3vw, 2.6rem); font-weight: 800; color: #4794A8; margin-bottom: 1rem; letter-spacing: -0.5px; }
    .section-title.dark { color: #1a1a1a; }
    .section-sub { font-size: 1rem; color: #555; line-height: 1.7; max-width: 560px; }

    /* ABOUT */
    .about { background: #f7fafc; }
    .about-header { text-align: center; max-width: 680px; margin: 0 auto 3.5rem; }
    .about-header .section-title { margin-bottom: 1rem; }
    .about-header p { font-size: 0.98rem; color: #666; line-height: 1.85; }
    .about-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; }
    .about-video-col { display: flex; flex-direction: column; gap: 1.25rem; }
    .about-video-wrap { position: relative; border-radius: 16px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.13); cursor: pointer; }
    .about-thumb { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
    .play-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 72px; height: 72px; background: rgba(238,125,12,0.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; box-shadow: 0 6px 28px rgba(238,125,12,0.5); }
    .about-video-wrap:hover .play-btn { background: #EE7D0C; transform: translate(-50%,-50%) scale(1.1); }
    .play-btn svg { margin-left: 4px; }
    .about-video-title { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.88rem; color: #444; line-height: 1.5; }
    .about-iframe-wrap { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 16px; overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.13); }
    .about-iframe-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .awards-col { display: flex; flex-direction: column; gap: 1.25rem; }
    .awards-col-label { font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #aaa; }
    .awards-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; }
    .award-tile { background: #fff; border-radius: 12px; border: 1.5px solid #eaeff3; padding: 0.75rem; display: flex; align-items: center; justify-content: center; aspect-ratio: 1; box-shadow: 0 2px 12px rgba(0,0,0,0.05); transition: transform 0.25s, box-shadow 0.25s; overflow: hidden; }
    .award-tile:hover { transform: scale(1.06); box-shadow: 0 8px 28px rgba(71,148,168,0.15); }
    .award-tile img { width: 100%; height: 100%; object-fit: contain; }
    .about-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 3rem; }
    .btn-outline-teal { background: transparent; color: #4794A8; border: 2px solid #4794A8; border-radius: 8px; padding: 14px 26px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; }
    .btn-outline-teal:hover { background: #4794A8; color: #fff; transform: translateY(-2px); }

    /* CONDITIONS */
    .conditions { background: #f4f6f8; }
    .conditions-top { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start; margin-bottom: 3.5rem; }
    .conditions-desc { font-size: 0.95rem; color: #555; line-height: 1.8; }
    .conditions-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }
    .condition-card { background: #fff; border: 1.5px solid #e8edf0; border-radius: 14px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s; display: flex; flex-direction: column; align-items: center; gap: 1rem; position: relative; overflow: hidden; }
    .condition-card-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0.1; transition: opacity 0.25s; }
    .condition-card:hover .condition-card-bg { opacity: 0.18; }
    .condition-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(71,148,168,0.15); border-color: #4794A8; }
    .condition-card:hover .card-icon { background: #4794A8; }
    .condition-card:hover .card-icon svg { stroke: #fff; }
    .card-icon { width: 58px; height: 58px; background: #edf6f9; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.25s; flex-shrink: 0; }
    .card-icon svg { transition: stroke 0.25s; }
    .card-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.9rem; color: #1a1a1a; }
    .view-all-btn { display: flex; align-items: center; gap: 8px; background: none; border: 1.5px solid #4794A8; color: #4794A8; border-radius: 8px; padding: 14px 28px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.88rem; cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.15s; margin-top: 2.5rem; }
    .view-all-btn:hover { background: #4794A8; color: #fff; transform: translateY(-2px); }
    .view-all-wrap { text-align: center; }

    /* TESTIMONIALS */
    .testimonials { background: linear-gradient(135deg, #f0f7fa 0%, #fafbfc 100%); }
    .testimonials-top { text-align: center; margin-bottom: 3.5rem; }
    .testimonials-top .section-sub { margin: 0 auto; }
    .slider-wrap { position: relative; overflow: hidden; }
    .slider-track { display: flex; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
    .testimonial-card { flex: 0 0 calc(33.333% - 1rem); margin: 0 0.5rem; background: #fff; border-radius: 16px; padding: 2.25rem; box-shadow: 0 4px 24px rgba(0,0,0,0.07); display: flex; flex-direction: column; gap: 1rem; }
    .quote-mark { font-size: 3.5rem; line-height: 1; color: #EE7D0C; font-family: Georgia, serif; opacity: 0.5; margin-bottom: -0.5rem; }
    .stars { display: flex; gap: 3px; }
    .star { color: #EE7D0C; font-size: 0.9rem; }
    .test-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: #1a1a1a; line-height: 1.4; }
    .test-text { font-size: 0.9rem; color: #666; line-height: 1.7; flex: 1; }
    .test-author { display: flex; align-items: center; gap: 12px; padding-top: 1rem; border-top: 1px solid #f0f0f0; }
    .author-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #4794A8, #2d7a8e); display: flex; align-items: center; justify-content: center; color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .author-name { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.85rem; color: #1a1a1a; }
    .author-label { font-size: 0.75rem; color: #999; }
    .slider-controls { display: flex; align-items: center; justify-content: center; gap: 1.5rem; margin-top: 2.5rem; }
    .slider-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #4794A8; background: transparent; color: #4794A8; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; font-size: 1.1rem; }
    .slider-btn:hover { background: #4794A8; color: #fff; }
    .slider-dots { display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; cursor: pointer; transition: background 0.2s, transform 0.2s; border: none; padding: 0; }
    .dot.active { background: #4794A8; transform: scale(1.3); }
    .test-cta { text-align: center; margin-top: 3.5rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .btn-teal { background: #4794A8; color: #fff; border: none; border-radius: 8px; padding: 16px 32px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 4px 20px rgba(71,148,168,0.35); }
    .btn-teal:hover { background: #3d829a; transform: translateY(-2px); }
    .btn-outline-dark { background: transparent; color: #2d2d2d; border: 2px solid #d0d0d0; border-radius: 8px; padding: 14px 28px; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
    .btn-outline-dark:hover { border-color: #2d2d2d; transform: translateY(-2px); }

    /* TREATMENTS */
    .treatments { background: #fff; }
    .treatments-inner { display: grid; grid-template-columns: 1fr 1.6fr; gap: 5rem; align-items: start; }
    .treatments-left { position: sticky; top: 100px; }
    .treatments-desc { font-size: 0.93rem; color: #666; line-height: 1.8; margin-bottom: 2rem; }
    .treatments-btns { display: flex; flex-direction: column; gap: 0.75rem; }
    .treatment-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .treatment-card { border-radius: 16px; overflow: hidden; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; position: relative; }
    .treatment-card:hover { transform: translateY(-6px); box-shadow: 0 16px 48px rgba(0,0,0,0.14); }
    .treatment-card:first-child { grid-column: 1 / -1; }
    .treatment-img { height: 220px; background: #c0d8df; position: relative; overflow: hidden; }
    .treatment-card:first-child .treatment-img { height: 280px; }
    .treatment-img-inner { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.5s; }
    .treatment-card:hover .treatment-img-inner { transform: scale(1.05); }
    .treatment-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,22,40,0.88) 0%, rgba(10,22,40,0.35) 100%); }
    .treatment-body { padding: 1.5rem; background: #fff; }
    .treatment-card:first-child .treatment-body { position: absolute; bottom: 0; left: 0; right: 0; background: transparent; padding: 1.5rem 2rem; }
    .treatment-card:first-child .treatment-title { color: #fff; font-size: 1.3rem; }
    .treatment-card:first-child .treatment-desc { color: rgba(255,255,255,0.85); }
    .treatment-card:first-child .treatment-link { color: #EE7D0C; }
    .treatment-num { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; color: #EE7D0C; text-transform: uppercase; margin-bottom: 0.5rem; }
    .treatment-title { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1rem; color: #1a1a1a; margin-bottom: 0.5rem; }
    .treatment-desc { font-size: 0.85rem; color: #777; line-height: 1.6; margin-bottom: 1rem; }
    .treatment-link { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.8rem; color: #4794A8; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: gap 0.2s; }
    .treatment-link:hover { gap: 10px; }

    /* LOCATIONS */
    .locations-section { background: #0d1e2e; padding: 5rem 5vw; }
    .locations-inner { display: grid; grid-template-columns: 1fr 1.1fr 1.1fr; gap: 3rem; align-items: start; }
    .loc-brand { display: flex; flex-direction: column; gap: 1.5rem; }
    .loc-logo { height: 64px; width: auto; object-fit: contain; object-position: left; }
    .loc-brand-desc { font-size: 0.85rem; color: rgba(255,255,255,0.45); line-height: 1.7; }
    .loc-socials { display: flex; gap: 0.65rem; flex-wrap: wrap; }
    .loc-social-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, border-color 0.2s, transform 0.2s; text-decoration: none; }
    .loc-social-btn:hover { background: #4794A8; border-color: #4794A8; transform: translateY(-3px); }
    .loc-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2rem; display: flex; flex-direction: column; gap: 1.25rem; transition: border-color 0.25s, background 0.25s; }
    .loc-card:hover { background: rgba(71,148,168,0.07); border-color: rgba(71,148,168,0.35); }
    .loc-card-name { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.05rem; color: #fff; display: flex; align-items: center; gap: 10px; }
    .loc-tag { background: #EE7D0C; color: #fff; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .loc-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); }
    .loc-info-row { display: flex; align-items: flex-start; gap: 10px; }
    .loc-info-icon { width: 32px; height: 32px; background: rgba(71,148,168,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .loc-info-text { font-size: 0.85rem; color: rgba(255,255,255,0.65); line-height: 1.6; }
    .loc-info-text strong { display: block; color: rgba(255,255,255,0.9); font-family: 'Montserrat', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 2px; text-transform: uppercase; }

// Intersection observer hook
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

// APP
function App() {
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [apptOpen, setApptOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => {
    // Register tweaks with host
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  useEffect(() => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  }, [tweaks]);

  // Inject accent colors as CSS vars
  useEffect(() => {
    document.documentElement.style.setProperty('--orange', tweaks.accentOrange);
    document.documentElement.style.setProperty('--teal', tweaks.accentTeal);
  }, [tweaks]);

  return (
    <>
      <Nav mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} onAppt={() => setApptOpen(true)}/>
      <main>
        <Hero onAppt={() => setApptOpen(true)} tweaks={tweaks}/>
        <About onAppt={() => setApptOpen(true)}/>
        <Treatments onAppt={() => setApptOpen(true)} tweaks={tweaks}/>
        <Conditions tweaks={tweaks}/>
        <Testimonials onAppt={() => setApptOpen(true)}/>
      </main>
      <LocationsSection/>
      <Footer/>
      <ApptModal open={apptOpen} onClose={() => setApptOpen(false)}/>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} open={tweaksOpen}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
